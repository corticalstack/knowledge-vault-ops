name: Vault Ingest

on:
  workflow_dispatch: {}
  push:
    paths:
      - 'AI/_inbox/**'
      - 'Cloud/_inbox/**'
      - 'Data/_inbox/**'
      - 'Engineering/_inbox/**'
      - 'Homelab/_inbox/**'
      - 'projects/**/_inbox/**'
      - 'agents-shared/_inbox/**'

permissions:
  contents: write
  issues: write
  id-token: write

# Concurrency: with cancel-in-progress: false, a running job is preserved AND
# only one pending job is kept per group (newer pushes cancel older pending
# runs). Safe because the inbox detection step below uses `find`, not git diff
# — whichever run executes processes every file currently in the inboxes,
# including any from cancelled pending pushes. Trigger collapsing, not loss.
concurrency:
  group: vault-ingest
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    # Prevent vault-ingest from re-triggering on its own commits (which start with "ingest:").
    # Actor-based guard is NOT used because luminary-scan also pushes as github-actions[bot]
    # and its scan(...) commits must be allowed through.
    if: "!startsWith(github.event.head_commit.message, 'ingest:')"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 0

      - name: Pull latest before ingest
        run: |
          git pull --rebase origin main || true

      - name: Identify pending inbox files
        id: inbox
        run: |
          # Find all inbox files currently present in the repo.
          # Ingest always deletes a file after processing, so anything still
          # here is unprocessed — no diff logic needed, no grep exit-code risk.
          INBOX_FILES=$(find . -path '*/_inbox/*.md' \
            ! -name 'README.md' \
            ! -name '.gitkeep' \
            | sed 's|^\./||' \
            | sort)
          if [ -z "$INBOX_FILES" ]; then
            echo "No pending inbox files — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Found inbox files:"
            echo "$INBOX_FILES"
            echo "$INBOX_FILES" > /tmp/inbox_files.txt
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.inbox.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.inbox.outputs.skip != 'true'
        run: pip install graphifyy --break-system-packages

      - name: Configure git identity
        if: steps.inbox.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Claude Code CLI
        if: steps.inbox.outputs.skip != 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude ingest
        if: steps.inbox.outputs.skip != 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          while IFS= read -r INBOX_FILE; do
            [ -z "$INBOX_FILE" ] && continue
            # Skip if the file was already deleted by a previous ingest in this run
            [ ! -f "$INBOX_FILE" ] && echo "Skipping $INBOX_FILE — already processed" && continue
            echo "--- Ingesting: $INBOX_FILE ---"
            claude -p "
          Process the inbox file at: $INBOX_FILE

          Follow these steps exactly:

          1. Read the inbox file at $INBOX_FILE

          2. Determine the destination type from the path:

             PATH STARTS WITH AI/, Cloud/, Data/, Engineering/, or Homelab/:
             Domain wiki ingestion. Decide: new page or enrichment of existing?
             - New concept: create page in Domain/category/ using the full wiki schema:
               frontmatter: title, aliases, tags, type, domain, status, source_count,
               created, updated, related, builds_on, contrasts_with, appears_in
               body sections (required, exact text):
                 ## How It Works
                 ## Tensions & Open Questions
                 ## See Also
                 ## Sources
             - Existing concept: edit that page, bump source_count, extend body, add links
             IMAGE PRESERVATION RULE: When the inbox source contains
             `![[Pasted image YYYYMMDDHHMMSS.png]]` embeds (Obsidian-style image
             references) and you are keeping the surrounding text, preserve those
             embeds verbatim in the resulting wiki page. Images live in `Assets/`
             at the vault root and Obsidian resolves the refs automatically. Do
             not strip image embeds when their accompanying text is being kept;
             diagrams/screenshots are often the most information-dense part of
             the source. Only drop an embed if you are also dropping the text it
             illustrates.
             YAML EDITING RULE: Never parse and re-serialize frontmatter with a YAML
             library. Use raw text/regex manipulation or targeted line edits only.
             yaml.safe_load followed by re-serialization corrupts builds_on and
             appears_in fields.

             PATH STARTS WITH projects/ and contains /_inbox/:
             Update projects/{repo}/context.md (architectural decisions/tradeoffs)
             or projects/{repo}/patterns.md (conventions/preferred patterns).
             Create the file if it does not exist.

             PATH STARTS WITH agents-shared/_inbox/:
             Update agents-shared/patterns.md (cross-repo conventions)
             or agents-shared/mistakes.md (bugs/gotchas to avoid).
             Update agents-shared/INDEX.md to reflect new entries.

          3. For domain wiki ingestion only:
             a. Wire bidirectional links — every wikilink in related: must link back
             b. Update the category _INDEX.md — add new page to All Pages list and
                relevant section; update How These Concepts Relate prose if meaningful
             c. Read the 5 most related existing pages; add new cross-references and
                update any claims that the new content adds depth to

          4. Run: python3 scripts/verify-wiki.py and capture the output.
             If the output is non-empty (errors reported):
             - Stage and commit: git add -A && git commit -m 'ingest(partial): {title} — verify errors'
             - Open a GitHub issue: gh issue create --title 'Vault ingest errors: $INBOX_FILE' --body '{captured verify output}'
             If output is empty (clean): continue to step 5

          5. Delete the inbox file: $INBOX_FILE

          6. Stage and commit all changes:
             git add -A
             git commit -m 'ingest: {title of ingested content}'

          Do not push — the next workflow step handles that.
          " --dangerously-skip-permissions
          done < /tmp/inbox_files.txt

      - name: Push ingested changes
        if: steps.inbox.outputs.skip != 'true'
        run: |
          for attempt in 1 2 3; do
            git fetch origin main
            if git rebase origin/main && git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          echo "Push failed after 3 attempts — ingest commits remain local to the runner"
          exit 1
